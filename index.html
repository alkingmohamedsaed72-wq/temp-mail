<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البريد المؤقت الاحترافي | Temp Mail Clone</title>
    
    <!-- الأيقونات والخطوط -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0068ff;
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* رأس الصفحة */
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: #1e293b80;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span { color: var(--primary-color); }

        /* الحاوية الرئيسية */
        .container {
            width: 95%;
            max-width: 800px;
            margin-bottom: 50px;
        }

        /* منطقة عنوان البريد */
        .address-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .instruction {
            color: var(--text-muted);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .email-wrapper {
            display: flex;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .email-wrapper:focus-within { border-color: var(--primary-color); }

        #email-display {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--primary-color);
            padding: 15px;
            font-size: clamp(16px, 4vw, 22px);
            text-align: center;
            font-family: monospace;
            outline: none;
            width: 100%;
        }

        .copy-btn-main {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .copy-btn-main:hover { background: #0056d2; }

        /* أزرار التحكم */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .action-item {
            background: #334155;
            color: white;
            border: none;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .action-item i { font-size: 18px; }
        .action-item:hover { background: #475569; transform: translateY(-2px); }

        /* صندوق الوارد */
        .inbox-container {
            background: var(--white);
            color: #1e293b;
            border-radius: 16px;
            margin-top: 30px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .inbox-header {
            background: #f1f5f9;
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 1.5fr 2fr 1fr;
            font-weight: 700;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        #messages-list { min-height: 200px; }

        .message-row {
            display: grid;
            grid-template-columns: 1.5fr 2fr 1fr;
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .message-row:hover { background: #f8fafc; }

        .msg-from { font-weight: 700; color: var(--primary-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .msg-subject { color: #475569; padding: 0 10px; }
        .msg-time { color: #94a3b8; font-size: 12px; text-align: left; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .spinner {
            animation: rotate 2s linear infinite;
            margin-bottom: 10px;
            display: block;
            font-size: 30px;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* التجاوب مع الجوال */
        @media (max-width: 600px) {
            .actions-grid { grid-template-columns: repeat(2, 1fr); }
            .inbox-header { display: none; }
            .message-row { 
                grid-template-columns: 1fr; 
                gap: 5px; 
                border-bottom: 8px solid #f8fafc;
            }
            .msg-time { text-align: right; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TEMP<span>MAIL</span> PRO</div>
    </header>

    <div class="container">
        <!-- منطقة البريد -->
        <div class="address-section">
            <p class="instruction">عنوان بريدك الإلكتروني الجاهز للاستخدام</p>
            <div class="email-wrapper">
                <input type="text" id="email-display" readonly value="جاري التوليد...">
                <button class="copy-btn-main" onclick="copyEmail()" title="نسخ البريد">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <div class="actions-grid">
                <button class="action-item" onclick="copyEmail()">
                    <i class="fas fa-clone"></i> نسخ
                </button>
                <button class="action-item" onclick="refreshInbox()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="action-item" onclick="changeEmail()">
                    <i class="fas fa-random"></i> تغيير
                </button>
                <button class="action-item" onclick="deleteEmail()">
                    <i class="fas fa-trash-alt"></i> حذف
                </button>
            </div>
        </div>

        <!-- منطقة صندوق الوارد -->
        <div class="inbox-container">
            <div class="inbox-header">
                <div>المرسل</div>
                <div>الموضوع</div>
                <div>الوقت</div>
            </div>
            <div id="messages-list">
                <div class="empty-state">
                    <i class="fas fa-spinner spinner"></i>
                    <p>في انتظار وصول رسائل جديدة...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let pollInterval;

        // 1. توليد بريد جديد
        async function generateEmail() {
            try {
                const response = await fetch('https://1secmail.com');
                const data = await response.json();
                currentEmail = data[0]; // تصحيح: data هي مصفوفة، نأخذ العنصر الأول
                document.getElementById('email-display').value = currentEmail;
                
                // تصفير الصندوق والبدء في الفحص
                resetInboxUI();
                startPolling();
            } catch (error) {
                document.getElementById('email-display').value = "خطأ في الاتصال!";
            }
        }

        // 2. جلب الرسائل
        async function fetchMessages() {
            if (!currentEmail) return;
            
            const [login, domain] = currentEmail.split('@');
            try {
                const response = await fetch(`https://1secmail.com{login}&domain=${domain}`);
                const messages = await response.json();
                
                renderMessages(messages);
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        // 3. عرض الرسائل في الواجهة
        function renderMessages(messages) {
            const listContainer = document.getElementById('messages-list');
            
            if (messages.length === 0) {
                return; // ابقِ على حالة "في انتظار الرسائل"
            }

            listContainer.innerHTML = messages.map(msg => `
                <div class="message-row" onclick="alert('تفاصيل الرسالة ستظهر هنا قريباً')">
                    <div class="msg-from">${msg.from}</div>
                    <div class="msg-subject">${msg.subject || '(بدون عنوان)'}</div>
                    <div class="msg-time">${msg.date.split(' ')[1]}</div>
                </div>
            `).join('');
        }

        // وظائف الأزرار
        function copyEmail() {
            const emailField = document.getElementById('email-display');
            if (emailField.value && emailField.value !== "جاري التوليد...") {
                navigator.clipboard.writeText(emailField.value);
                
                // تأثير بصري بسيط
                const btn = document.querySelector('.copy-btn-main');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
            }
        }

        function refreshInbox() {
            fetchMessages();
        }

        function changeEmail() {
            generateEmail();
        }

        function deleteEmail() {
            location.reload();
        }

        function resetInboxUI() {
            document.getElementById('messages-list').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-spinner spinner"></i>
                    <p>في انتظار وصول رسائل جديدة...</p>
                </div>`;
        }

        // فحص تلقائي كل 6 ثوانٍ
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchMessages, 6000);
        }

        // البدء عند تحميل الصفحة
        window.onload = generateEmail;
    </script>
</body>
</html>
