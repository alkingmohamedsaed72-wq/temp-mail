<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بريد مؤقت - خدمة البريد العشوائي</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --main-blue: #0068ff;
            --bg-dark: #1b2432;
            --card-dark: #252f3f;
            --text-gray: #9ca3af;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; padding: 20px; text-align: center; background: #151d29; }

        .main-container { width: 100%; max-width: 900px; padding: 40px 20px; }

        /* منطقة العنوان - محاكاة Temp-Mail */
        .address-box {
            background: var(--card-dark);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            background: #151d29;
            border: 2px solid #374151;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
        }

        #email-address {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: var(--main-blue);
            font-size: 20px;
            text-align: center;
            font-family: 'Roboto', sans-serif;
        }

        .btn-action {
            background: var(--main-blue);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        .btn-action:hover { background: #0056d2; }

        /* الأزرار السفلية */
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .control-btn {
            background: #2d3848;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .control-btn i { margin-left: 8px; }
        .control-btn:hover { background: #3d4a5d; }

        /* منطقة صندوق الوارد */
        .inbox-area {
            background: white;
            color: #333;
            border-radius: 12px;
            min-height: 300px;
            overflow: hidden;
        }

        .inbox-header {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .mail-item {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }

        .mail-item:hover { background: #f0f7ff; }

        .loading-dots:after { content: '...'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }

        @media (max-width: 600px) {
            .controls { grid-template-columns: repeat(2, 1fr); }
            .mail-item { grid-template-columns: 1fr; gap: 5px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Temp Mail <span style="color: var(--main-blue);">PRO</span></h2>
    </div>

    <div class="main-container">
        <div class="address-box">
            <p style="color: var(--text-gray);">عنوان بريدك الإلكتروني المؤقت</p>
            <div class="input-group">
                <input type="text" id="email-address" readonly value="جاري التحميل...">
                <button class="btn-action" onclick="copyEmail()" title="نسخ">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="copyEmail()"><i class="fas fa-copy"></i>نسخ</button>
                <button class="control-btn" onclick="fetchMessages()"><i class="fas fa-sync-alt"></i>تحديث</button>
                <button class="control-btn" onclick="generateEmail()"><i class="fas fa-edit"></i>تغيير</button>
                <button class="control-btn" onclick="location.reload()"><i class="fas fa-trash"></i>حذف</button>
            </div>
        </div>

        <div class="inbox-area">
            <div class="inbox-header">
                <span>المرسل</span>
                <span>الموضوع</span>
                <span>الوقت</span>
            </div>
            <div id="messages-list">
                <div style="text-align: center; padding: 60px; color: #94a3b8;">
                    <i class="fas fa-envelope-open-text fa-3x" style="display: block; margin-bottom: 10px;"></i>
                    <span class="loading-dots">في انتظار الرسائل الواردة</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";

        async function generateEmail() {
            const res = await fetch('https://1secmail.com');
            const data = await res.json();
            currentEmail = data[0];
            document.getElementById('email-address').value = currentEmail;
            fetchMessages();
        }

        async function fetchMessages() {
            if (!currentEmail) return;
            const [user, domain] = currentEmail.split('@');
            const res = await fetch(`https://1secmail.com{user}&domain=${domain}`);
            const messages = await res.json();
            
            const list = document.getElementById('messages-list');
            if (messages.length > 0) {
                list.innerHTML = messages.map(msg => `
                    <div class="mail-item">
                        <div style="font-weight: bold;">${msg.from.split('@')[0]}</div>
                        <div style="color: #4b5563;">${msg.subject}</div>
                        <div style="color: #9ca3af; font-size: 12px; text-align: left;">${msg.date.split(' ')[1]}</div>
                    </div>
                `).join('');
            }
        }

        function copyEmail() {
            const emailInput = document.getElementById('email-address');
            emailInput.select();
            document.execCommand('copy');
            alert("تم نسخ البريد: " + emailInput.value);
        }

        // التحديث التلقائي كل 5 ثوانٍ
        setInterval(fetchMessages, 5000);
        
        // البدء عند التحميل
        window.onload = generateEmail;
    </script>
</body>
</html>
